<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میری ویب سائٹ | My Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .urdu {
            font-size: 1.5rem;
            color: #333;
            margin: 20px 0;
            line-height: 1.8;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .counter {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #764ba2;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ خوش آمدید ✨</h1>
    <h1>Welcome to My Website</h1>
    
    <div class="urdu">
        یہ میری نئی ویب سائٹ ہے<br>
        میں Acode app سے بنا رہا ہوں
    </div>
    
    <button class="btn" onclick="showMessage()">Click Me! 🚀</button>
    
    <div class="counter">
        Button clicks: <span id="count">0</span>
    </div>
</div>

<script>
    let count = 0;
    
    function showMessage() {
        count++;
        document.getElementById('count').innerHTML = count;
        
        if(count === 1) {
            alert('Welcome to my website! 🎉');
        } else if(count === 5) {
            alert('You clicked 5 times! 🔥');
        } else {
            alert('Thanks for clicking! ❤️');
        }
    }
</script>

</body>
</html>
